name: Docs / Pages

on:
  push:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "brain/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "brain/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[apidocs]"

      - name: Build documentation
        run: python -m mkdocs build --strict

      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: mkdocs-site
          path: site
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Write workflow summary
        run: |
          {
            echo "## MkDocs"
            echo "- Сайт успешно собран в \`site/\`."
            echo "- В артефактах workflow доступен архив \`mkdocs-site\`."
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "- Для pull request выполняется только build-проверка и preview-артефакт."
            elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "- Для \`main\` после build запускается deploy в GitHub Pages."
            else
              echo "- Для веток без deploy сохраняется preview-артефакт."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
